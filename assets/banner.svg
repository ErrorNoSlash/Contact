<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#040507"/>
      <stop offset="0.5" stop-color="#14171a"/>
      <stop offset="1" stop-color="#040507"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c7ced2"/>
      <stop offset="0.5" stop-color="#AEB5B8"/>
      <stop offset="1" stop-color="#c7ced2"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="260" rx="16" fill="url(#bg)"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="90" cy="50" r="1.6" opacity="0.5"/>
    <circle cx="180" cy="150" r="1.1" opacity="0.3"/>
    <circle cx="260" cy="70" r="1.4" opacity="0.45"/>
    <circle cx="330" cy="200" r="1.2" opacity="0.3"/>
    <circle cx="420" cy="40" r="1.6" opacity="0.55"/>
    <circle cx="520" cy="220" r="1.1" opacity="0.25"/>
    <circle cx="640" cy="35" r="1.3" opacity="0.45"/>
    <circle cx="760" cy="210" r="1.5" opacity="0.4"/>
    <circle cx="840" cy="60" r="1.2" opacity="0.4"/>
    <circle cx="930" cy="170" r="1.6" opacity="0.5"/>
    <circle cx="1020" cy="45" r="1.1" opacity="0.3"/>
    <circle cx="1110" cy="140" r="1.4" opacity="0.45"/>
    <circle cx="150" cy="230" r="1.3" opacity="0.4"/>
    <circle cx="700" cy="120" r="1.0" opacity="0.2"/>
    <circle cx="1150" cy="220" r="1.2" opacity="0.4"/>
    <circle cx="60" cy="130" r="1.1" opacity="0.3"/>
  </g>

  <!-- envelope nod to the contact page, left -->
  <g stroke="#AEB5B8" stroke-width="3" fill="none" opacity="0.35" transform="translate(120,130)">
    <rect x="-34" y="-24" width="68" height="48" rx="6"/>
    <path d="M -34 -18 L 0 8 L 34 -18"/>
  </g>
  <!-- envelope nod, right -->
  <g stroke="#AEB5B8" stroke-width="3" fill="none" opacity="0.35" transform="translate(1080,130)">
    <rect x="-34" y="-24" width="68" height="48" rx="6"/>
    <path d="M -34 -18 L 0 8 L 34 -18"/>
  </g>

  <text x="600" y="132" text-anchor="middle"
        font-family="Outfit, Segoe UI, Ubuntu, DejaVu Sans, sans-serif"
        font-size="86" font-weight="800" fill="url(#txt)"
        letter-spacing="2">Contact</text>

  <text x="600" y="188" text-anchor="middle"
        font-family="Outfit, Segoe UI, Ubuntu, DejaVu Sans, sans-serif"
        font-size="22" font-style="italic" fill="#8a9093">A simple link-in-bio contact page — vanilla HTML, CSS &amp; JS</text>
</svg>
